apiVersion: batch/v1
kind: Job
metadata:
  name: atong-marina-jittering-test-jittering-0-seed-0 
  labels:
    owner: atong
spec:
  template:
    spec:

      affinity:         
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                    - NVIDIA-TITAN-RTX
                    - NVIDIA-A40
                    - NVIDIA-GeForce-RTX-3090
                    - NVIDIA-RTX-A6000
                    - NVIDIA-RTX-A5000
                    - NVIDIA-A10
                    - NVIDIA-GeForce-RTX-4090
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                    - gpu-13.nrp.mghpcc.org
      containers:
        - name: demo
          image: gitlab-registry.nrp-nautilus.io/a8tong/smart-moonshot/pixi-cuda:12.8.1
          command: ["/bin/bash"]
          args:
            - "-c"
            - >-
              set -euxo pipefail &&
              bash /root/gurusmart/startup.sh DiffMSDataset.zip &&
              cd /code &&
              pixi run train.diffms -- --seed 0 --experiment_name diffms-run
          volumeMounts:
            - mountPath: "/root/gurusmart"
              name: atong-spectre
            - mountPath: "/root/datasets"
              name: smart-datasets
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /workspace
              name: data-unzip
            - mountPath: /code
              name: code-workdir
          resources:
            limits:
              memory: 40Gi
              cpu: "5"
              ephemeral-storage: 600Gi
              nvidia.com/gpu: "1"
            requests:
              memory: 40Gi
              cpu: "5"
              ephemeral-storage: 600Gi
              nvidia.com/gpu: "1"

      volumes:
        - name: atong-spectre
          persistentVolumeClaim:
            claimName: atong-spectre
        - name: smart-datasets
          persistentVolumeClaim:
            claimName: smart-datasets
        - name: dshm
          emptyDir:
            medium: Memory
        - name: data-unzip
          emptyDir: {}
        - name: code-workdir
          emptyDir: {}
      restartPolicy: Never
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
  backoffLimit: 0
