[workspace]
authors = ["Anthony Tong <atong28.usa@gmail.com>"]
channels = ["https://prefix.dev/conda-forge"]
name = "SMART-Moonshot"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
"train.marina" = { cmd = "bash launch.sh marina --nproc_per_node 4", env = { CUDA_LAUNCH_BLOCKING = "1" } }
"train.spectre" = { cmd = "bash launch.sh spectre --nproc_per_node 4", env = { CUDA_LAUNCH_BLOCKING = "1" } }
"debug.marina" = { cmd = "bash launch.sh marina --nproc_per_node 2 -- --debug" }
"debug.spectre" = { cmd = "bash launch.sh spectre --nproc_per_node 2 -- --debug" }
"benchmark.marina" = { cmd = "python -m src.main marina --no_train --no_test --benchmark --load_from_checkpoint checkpoints/marina_best/best.ckpt" }
"benchmark.spectre" = { cmd = "python -m src.main spectre --no_train --no_test --benchmark --load_from_checkpoint checkpoints/spectre_best/best.ckpt" }
"deploy" = { cmd = "bash nautilus/scripts/deploy.sh" }

"kube.get_pods" = { cmd = "kubectl get pods" }
"kube.start_pod" = { cmd = "kubectl create -f nautilus/pods/devel.yaml" }
"kube.stop_pod" = { cmd = "kubectl delete pod devel-atong" }
"kube.delete_jobs" = { cmd = "kubectl delete jobs -l owner=atong" }

[dependencies]
python = ">=3.13,<3.14"
numpy = ">=2.4.2,<3"
matplotlib = ">=3.10.8,<4"
pandas = ">=3.0.1,<4"
wandb = ">=0.25.0,<0.26"
rdkit = ">=2025.9.6,<2026"
ipython = ">=9.10.0,<10"
ipykernel = ">=7.2.0,<8"
jupyter = ">=1.1.1,<2"
tqdm = ">=4.67.3,<5"
tyro = ">=1.0.8,<2"
gdown = ">=5.2.1,<6"
openpyxl = ">=3.1.5,<4"
pyarrow = ">=23.0.1,<24"

[pypi-dependencies]
torch = { version = "==2.8.0", index = "https://download.pytorch.org/whl/cu128" }
lightning = { version = "==2.6.1" }
torch_geometric = { version = "==2.7.0"}